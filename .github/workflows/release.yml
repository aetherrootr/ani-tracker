name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.1

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Build release artifacts
        run: scripts/build_release.sh

      - name: Package release artifacts
        run: |
          tag="${GITHUB_REF_NAME}"
          mkdir -p release-assets
          tar -czf "release-assets/ani-tracker-backend-${tag}.tar.gz" -C dist backend
          tar -czf "release-assets/ani-tracker-web-${tag}.tar.gz" -C dist web

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          gh release create "${tag}" \
            release-assets/*.tar.gz \
            --title "${tag}" \
            --generate-notes \
            --verify-tag
