x-app-environment: &app-environment
  SECRET_KEY: ${SECRET_KEY}
  DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
  CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:${APP_PORT:-8080}}
  CELERY_BROKER_URL: redis://redis:6379/0
  CELERY_RESULT_BACKEND: redis://redis:6379/1
  ANIME_TRACKER_INSTANCE_PATH: /var/lib/ani-tracker
  WEB_CONCURRENCY: ${WEB_CONCURRENCY:-2}
  SESSION_COOKIE_SAMESITE: ${SESSION_COOKIE_SAMESITE:-Lax}
  OIDC_ENABLED: ${OIDC_ENABLED:-false}
  OIDC_ISSUER: ${OIDC_ISSUER:-}
  OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
  OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
  OIDC_SCOPE: ${OIDC_SCOPE:-openid email profile}
  TMDB_API_KEY: ${TMDB_API_KEY:-}
  TMDB_ACCESS_TOKEN: ${TMDB_ACCESS_TOKEN:-}
  TMDB_INCLUDE_ADULT: ${TMDB_INCLUDE_ADULT:-false}
  TVDB_API_KEY: ${TVDB_API_KEY:-}
  TVDB_PIN: ${TVDB_PIN:-}
  PROVIDER_UPDATES_ENABLED: ${PROVIDER_UPDATES_ENABLED:-true}
  PROVIDER_UPDATES_INTERVAL_SECONDS: ${PROVIDER_UPDATES_INTERVAL_SECONDS:-900}
  PROVIDER_UPDATES_INITIAL_LOOKBACK_SECONDS: ${PROVIDER_UPDATES_INITIAL_LOOKBACK_SECONDS:-3600}
  PROVIDER_UPDATES_OVERLAP_SECONDS: ${PROVIDER_UPDATES_OVERLAP_SECONDS:-600}
  PROVIDER_UPDATES_LEASE_SECONDS: ${PROVIDER_UPDATES_LEASE_SECONDS:-600}
  PROVIDER_UPDATES_SAFETY_LAG_SECONDS: ${PROVIDER_UPDATES_SAFETY_LAG_SECONDS:-60}
  PROVIDER_UPDATES_MAX_PAGES: ${PROVIDER_UPDATES_MAX_PAGES:-10}
  TVDB_STATUS_AIR_TIME_BACKFILL_BATCH_SIZE: ${TVDB_STATUS_AIR_TIME_BACKFILL_BATCH_SIZE:-10}
  IMPORT_PROVIDER_TIMEOUT: ${IMPORT_PROVIDER_TIMEOUT:-5}
  ANIME_SYNC_CRON_HOUR: ${ANIME_SYNC_CRON_HOUR:-4}
  ANIME_SYNC_CRON_MINUTE: ${ANIME_SYNC_CRON_MINUTE:-0}
  NON_INCREMENTAL_ANIME_SYNC_CRON_HOUR: ${NON_INCREMENTAL_ANIME_SYNC_CRON_HOUR:-0,4,8,12,16,20}
  NON_INCREMENTAL_ANIME_SYNC_CRON_MINUTE: ${NON_INCREMENTAL_ANIME_SYNC_CRON_MINUTE:-0}
  EPISODE_STATUS_REFRESH_INTERVAL_SECONDS: ${EPISODE_STATUS_REFRESH_INTERVAL_SECONDS:-60}
  UNTRACKED_ANIME_CLEANUP_DISABLED: ${UNTRACKED_ANIME_CLEANUP_DISABLED:-true}
  UNTRACKED_ANIME_CLEANUP_CRON_MONTHS: ${UNTRACKED_ANIME_CLEANUP_CRON_MONTHS:-}
  UNTRACKED_ANIME_CLEANUP_CRON_DAY: ${UNTRACKED_ANIME_CLEANUP_CRON_DAY:-}
  UNTRACKED_ANIME_CLEANUP_CRON_HOUR: ${UNTRACKED_ANIME_CLEANUP_CRON_HOUR:-}
  UNTRACKED_ANIME_CLEANUP_CRON_MINUTE: ${UNTRACKED_ANIME_CLEANUP_CRON_MINUTE:-}
  AUTO_IMPORT_TVDB_SEASONS_ENABLED: ${AUTO_IMPORT_TVDB_SEASONS_ENABLED:-false}
  AUTO_IMPORT_TVDB_SEASONS_CRON_DAY: ${AUTO_IMPORT_TVDB_SEASONS_CRON_DAY:-}
  AUTO_IMPORT_TVDB_SEASONS_CRON_HOUR: ${AUTO_IMPORT_TVDB_SEASONS_CRON_HOUR:-}
  AUTO_IMPORT_TVDB_SEASONS_CRON_MINUTE: ${AUTO_IMPORT_TVDB_SEASONS_CRON_MINUTE:-}
  AUTO_IMPORT_BANGUMI_RELATED_ANIME_ENABLED: ${AUTO_IMPORT_BANGUMI_RELATED_ANIME_ENABLED:-false}
  AUTO_IMPORT_BANGUMI_RELATED_ANIME_CRON_DAY: ${AUTO_IMPORT_BANGUMI_RELATED_ANIME_CRON_DAY:-}
  AUTO_IMPORT_BANGUMI_RELATED_ANIME_CRON_HOUR: ${AUTO_IMPORT_BANGUMI_RELATED_ANIME_CRON_HOUR:-}
  AUTO_IMPORT_BANGUMI_RELATED_ANIME_CRON_MINUTE: ${AUTO_IMPORT_BANGUMI_RELATED_ANIME_CRON_MINUTE:-}
  APP_LOGO_FILE: ${APP_LOGO_FILE:-}
  APP_FAVICON_FILE: ${APP_FAVICON_FILE:-}
  APP_PWA_ICON_192_FILE: ${APP_PWA_ICON_192_FILE:-}
  APP_PWA_ICON_512_FILE: ${APP_PWA_ICON_512_FILE:-}
  APP_PWA_ICON_MASKABLE_FILE: ${APP_PWA_ICON_MASKABLE_FILE:-}
  APP_APPLE_TOUCH_ICON_FILE: ${APP_APPLE_TOUCH_ICON_FILE:-}
  TZ: ${TZ:-UTC}

services:
  app:
    image: ghcr.io/aetherrootr/ani-tracker:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8080}:8080"
    environment: *app-environment
    volumes:
      - ani_tracker_data:/var/lib/ani-tracker

  worker:
    image: ghcr.io/aetherrootr/ani-tracker:latest
    restart: unless-stopped
    command:
      - python
      - /opt/ani-tracker/backend/ani-tracker.pyz
      - worker
      - --beat
      - --schedule
      - /var/lib/ani-tracker/celerybeat-schedule
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      app:
        condition: service_started
    environment: *app-environment
    volumes:
      - ani_tracker_data:/var/lib/ani-tracker

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${TZ:-UTC}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  ani_tracker_data:
  postgres_data:
  redis_data:
