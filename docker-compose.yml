x-app-environment: &app-environment
  SECRET_KEY: ${SECRET_KEY}
  DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
  CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:${APP_PORT:-8080}}
  CELERY_BROKER_URL: redis://redis:6379/0
  CELERY_RESULT_BACKEND: redis://redis:6379/1
  ANIME_TRACKER_INSTANCE_PATH: /var/lib/ani-tracker
  WEB_CONCURRENCY: ${WEB_CONCURRENCY:-2}
  SESSION_COOKIE_SAMESITE: ${SESSION_COOKIE_SAMESITE:-Lax}
  OIDC_ENABLED: ${OIDC_ENABLED:-false}
  OIDC_ISSUER: ${OIDC_ISSUER:-}
  OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
  OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
  OIDC_SCOPE: ${OIDC_SCOPE:-openid email profile}
  TMDB_API_KEY: ${TMDB_API_KEY:-}
  TMDB_ACCESS_TOKEN: ${TMDB_ACCESS_TOKEN:-}
  TMDB_INCLUDE_ADULT: ${TMDB_INCLUDE_ADULT:-false}
  TVDB_API_KEY: ${TVDB_API_KEY:-}
  TVDB_PIN: ${TVDB_PIN:-}
  TZ: ${TZ:-UTC}

services:
  app:
    build:
      context: .
    image: ani-tracker:local
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8080}:8080"
    environment: *app-environment
    volumes:
      - ani_tracker_data:/var/lib/ani-tracker

  worker:
    image: ani-tracker:local
    restart: unless-stopped
    command: ["python", "/opt/ani-tracker/backend/ani-tracker.pyz", "worker"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      app:
        condition: service_started
    environment: *app-environment
    volumes:
      - ani_tracker_data:/var/lib/ani-tracker

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${TZ:-UTC}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  ani_tracker_data:
  postgres_data:
  redis_data:
